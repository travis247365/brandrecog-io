<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BrandRecog.io — Get demo access</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--charcoal:#3A3A3A;--charcoal2:#2C2C2C;--cyan:#00BCD4;--cyan-d:#0097A7;--yellow:#FFC107;
    --ink:#23262A;--slate:#6B7280;--line:#E6E8EB;--card:#fff;--pale:#E7F7FA;--green:#2E7D32;--red:#C62828;
    --display:'Montserrat',sans-serif;--body:'Inter',sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:var(--body);color:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(900px 480px at 80% -10%,#16384a 0%,transparent 60%),linear-gradient(160deg,var(--charcoal2),#1b1b1b)}
  .card{width:100%;max-width:560px;background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.45)}
  .top{background:var(--charcoal);color:#fff;padding:24px 30px;position:relative;border-bottom:3px solid var(--cyan)}
  .top::before{content:"";position:absolute;left:0;top:0;width:52px;height:7px;background:var(--cyan)}
  .logo{font-family:var(--display);font-weight:800;font-size:24px}.logo .io{color:var(--cyan)}
  .sub{color:#b9bdc2;font-size:12.5px;margin-top:4px}
  .body{padding:24px 30px 28px}
  h2{font-family:var(--display);margin:0 0 4px;font-size:20px;color:var(--charcoal)}
  .lead{color:var(--slate);font-size:13.5px;margin:0 0 16px}
  label{display:block;font-size:11px;letter-spacing:.4px;text-transform:uppercase;color:var(--slate);font-weight:700;margin:12px 0 5px}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-family:var(--body);font-size:14px;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--cyan);border-color:var(--cyan)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:520px){.row{grid-template-columns:1fr}}
  .tierhint{margin-top:8px;font-size:12.5px;border-radius:8px;padding:9px 12px;display:none}
  .tierhint.show{display:block}
  .tierhint.biz{background:#eaf3ea;border:1px solid var(--green);color:#1f5a27}
  .tierhint.free{background:#fff7e0;border:1px solid var(--yellow);color:#5b4a13}
  .btn{width:100%;margin-top:18px;background:var(--cyan);color:#06343b;border:0;border-radius:10px;padding:13px;font-family:var(--display);font-weight:800;font-size:14.5px;cursor:pointer}
  .btn:hover{background:var(--cyan-d);color:#fff}
  .err{display:none;margin-top:10px;color:var(--red);font-size:13px}.err.show{display:block}
  .foot{padding:0 30px 20px;color:var(--slate);font-size:11px}
  .foot a{color:var(--cyan-d);font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="logo">BrandRecog<span class="io">.io</span></div>
      <div class="sub">Live demo access · part of the BrandCog.ai platform</div>
    </div>
    <div class="body">
      <h2>Get demo access</h2>
      <p class="lead">Work email → live recognition data. Free email → the demo with mock data (same experience).</p>
      <div class="row">
        <div><label>Full name</label><input id="name" placeholder="Your name" /></div>
        <div><label>Work email</label><input id="email" type="email" placeholder="you@company.com" /></div>
      </div>
      <div class="tierhint" id="hint"></div>
      <div class="row">
        <div><label>Company</label><input id="company" placeholder="Brand / agency / media owner" /></div>
        <div><label>Role</label><input id="role" placeholder="e.g. Marketing Director" /></div>
      </div>
      <div class="row">
        <div><label>Market</label><select id="market"><option>Zambia</option><option>South Africa</option><option>Pan-African</option><option>Other</option></select></div>
        <div><label>You are a…</label><select id="type"><option>Brand / advertiser</option><option>Agency (brand/activation/research)</option><option>Media owner</option><option>Consulting firm</option><option>Other</option></select></div>
      </div>
      <button class="btn" id="go">Enter the live demo →</button>
      <div class="err" id="err"></div>
    </div>
    <div class="foot">By continuing you agree to a sandboxed demo. Already provisioned? <a href="/login">Client login</a> · <a href="/marketing">Learn more</a></div>
  </div>
<script>
const FREE=["gmail.com","googlemail.com","yahoo.com","ymail.com","outlook.com","hotmail.com","live.com","msn.com","icloud.com","me.com","proton.me","protonmail.com","aol.com","gmx.com","mail.com","zoho.com","yandex.com"];
const email=document.getElementById("email"), hint=document.getElementById("hint");
email.addEventListener("input",()=>{
  const d=(email.value.split("@")[1]||"").toLowerCase().trim();
  if(!d){ hint.className="tierhint"; return; }
  if(FREE.includes(d)){ hint.className="tierhint free show"; hint.textContent="Free-email domain → demo with mock data. Use a work email for live recognition data."; }
  else { hint.className="tierhint biz show"; hint.textContent="✓ Business email → live recognition data access."; }
});
const go=document.getElementById("go"), err=document.getElementById("err");
const v=id=>document.getElementById(id).value.trim();
go.onclick=async()=>{
  err.classList.remove("show");
  if(!v("name")||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v("email"))){ err.textContent="Please add your name and a valid email."; err.classList.add("show"); return; }
  go.disabled=true; go.textContent="Setting up…";
  try{
    const res=await fetch("/api/signup",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:v("name"),email:v("email"),company:v("company"),role:v("role"),market:v("market"),type:v("type")})});
    const d=await res.json();
    if(!res.ok) throw new Error(d.detail||"Sign-up failed");
    location.href="/app";
  }catch(e){ err.textContent=e.message; err.classList.add("show"); go.disabled=false; go.textContent="Enter the live demo →"; }
};
</script>
</body>
</html>
