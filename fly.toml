# fly.toml — BrandCog.io · Travis Paul Consulting Ltd
app = "brandcog-io"
primary_region = "jnb"   # Johannesburg — closest region to Zambia

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  MOCK = "1"
  DATA_DIR = "/data"

[mounts]
  source = "brandcog_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
